name: ci

on:
  push:
  pull_request:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Run public custom-model benchmark
        run: python scripts/run_benchmark.py --model examples/custom_model_example.py:DampedLinearUserModel --output results/ci_public_benchmark

      - name: Run public built-in benchmark
        run: python scripts/run_benchmark.py --models linear_narx mlp_state_space --output results/ci_builtin_benchmark

      - name: Build public event-risk figure
        run: python scripts/v2_build_public_event_risk_figure.py --config configs/v2/v2_public_benchmark_hardening.yaml --output docs/v2/figures/event_risk_vs_rmse_public.png

      - name: Check public benchmark package
        run: python scripts/v2_check_public_benchmark_package.py --config configs/v2/v2_public_benchmark_hardening.yaml --manifest results/v2_public_benchmark_hardening/package_manifest.json
