audit_id: effect_size_practicality_audit_v1

systems:
  - two_tank
  - cstr

primary_coverages:
  - 0.05
  - 0.10

baseline_judge: best_single_signal_selected_on_calibration
calibrated_family:
  - calibration_selected_candidate_ranker
  - rank_normalized_linear
  - logistic_calibrated_judge
  - isotonic_calibrated_judge
  - quantile_rule_judge
  - conservative_low_coverage_judge

diagnostic_oracle: oracle_error_rank

minimum_absolute_far_reduction: 0.05
minimum_relative_far_reduction: 0.10
bootstrap_iterations: 1000
confidence_level: 0.95

seed_win_threshold_strong: 0.8
seed_win_threshold_weak: 0.6

bad_rmse_thresholds:
  - 0.05
  - 0.10
  - 0.15
  - 0.20
  - 0.30
  - 0.50

forbidden:
  allow_new_judges: false
  allow_new_models: false
  allow_new_systems: false
  allow_protocol_mutation: false
