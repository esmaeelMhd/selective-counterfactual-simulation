audit_id: repair_signal_semantics_audit_v1

systems:
  - two_tank
  - cstr

source_artifacts:
  two_tank_calibrated: results/calibrated_two_tank
  cstr_calibrated: results/calibrated_cstr
  cstr_weakness: results/cstr_weakness_audit
  practical_gate: reports/practical_utility_decision_gate.md
  cstr_weakness_diagnosis: reports/cstr_weakness_diagnosis.md
  protocol_lock: docs/calibrated_protocol_lock_v1.md

primary_coverages:
  - 0.05
  - 0.10

bad_rmse_threshold: 0.15

practical_thresholds:
  minimum_absolute_far_reduction: 0.05
  minimum_relative_far_reduction: 0.10

baseline_judge: best_single_signal_selected_on_calibration
calibrated_reference_judge: calibration_selected_candidate_ranker
diagnostic_oracle: oracle_error_rank

allowed_models:
  - hold_last
  - linear_narx
  - mlp_state_space

base_signals:
  - support_distance
  - uncertainty_score
  - disagreement_score
  - invariant_residual
  - repair_amount

signal_sets:
  full_original:
    - support_distance
    - uncertainty_score
    - disagreement_score
    - invariant_residual
    - repair_amount

  no_repair:
    - support_distance
    - uncertainty_score
    - disagreement_score
    - invariant_residual

  invariant_only:
    - invariant_residual

  repair_only:
    - repair_amount

  no_repair_no_uncertainty:
    - support_distance
    - disagreement_score
    - invariant_residual

diagnostic_thresholds:
  repair_near_zero_epsilon: 1.0e-9
  min_cstr_absolute_margin_improvement: 0.02
  max_allowed_twotank_margin_drop: 0.02
  min_repair_auroc_useful: 0.70
  max_repair_auroc_blind: 0.60

forbidden:
  allow_new_systems: false
  allow_new_models: false
  allow_new_signals: false
  allow_new_judge_families: false
  allow_protocol_mutation: false
  allow_prior_artifact_overwrite: false
