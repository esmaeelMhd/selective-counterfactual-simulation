experiment_id: calibrated_two_tank
seed: 42
system_id: two_tank
horizon: 50
dt: 0.1

n_model_train: 300
n_calibration_id: 50
n_calibration_ood: 50
n_test_id: 100
n_test_ood: 100
output_dir: results/calibrated_two_tank
uncertainty_samples: 3

models:
  - hold_last
  - linear_narx
  - mlp_state_space

signals:
  - support_distance
  - uncertainty_score
  - disagreement_score
  - invariant_residual
  - repair_amount

judges:
  - support_only
  - uncertainty_only
  - disagreement_only
  - invariant_only
  - repair_only
  - combined_linear
  - best_single_signal_selected_on_calibration
  - rank_normalized_linear
  - logistic_calibrated_judge
  - isotonic_calibrated_judge
  - quantile_rule_judge
  - conservative_low_coverage_judge
  - random_baseline
  - oracle_error_rank

bad_threshold:
  metric: rmse
  value: 0.15

coverages:
  - 0.05
  - 0.10
  - 0.20
  - 0.40
  - 0.60
  - 0.80
  - 1.00

primary_coverages:
  - 0.05
  - 0.10
